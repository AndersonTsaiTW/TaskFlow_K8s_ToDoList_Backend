name: Build and Push to ECR

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow -d taskflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://taskflow:password@localhost:5432/taskflow
      SECRET_KEY: test-secret-key
      HURL_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: DATABASE_URL=sqlite:///./test_taskflow.db python -m pytest

      - name: Start API
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          echo $! > api.pid

      - name: Wait for readiness
        run: |
          for i in {1..30}; do
            if curl -fsS "$HURL_BASE_URL/readyz"; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run hurl API tests
        run: |
          docker run --rm --network host -v "$PWD:/work" -w /work ghcr.io/orange-opensource/hurl:latest --test --variable base_url="$HURL_BASE_URL" hurl/health.hurl
          docker run --rm --network host -v "$PWD:/work" -w /work ghcr.io/orange-opensource/hurl:latest --test --variable base_url="$HURL_BASE_URL" --variable email="ci-auth-${GITHUB_RUN_ID}@example.com" --variable password="password123" hurl/auth.hurl
          docker run --rm --network host -v "$PWD:/work" -w /work ghcr.io/orange-opensource/hurl:latest --test --variable base_url="$HURL_BASE_URL" --variable email="ci-todos-${GITHUB_RUN_ID}@example.com" --variable password="password123" hurl/todos.hurl

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: taskflow/api
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Print image URI
        run: |
          echo "✅ Build completed successfully!"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/taskflow/api:${{ github.ref_name }}"
